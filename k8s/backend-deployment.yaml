apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: inventory-manager
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: inventory-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: lucaesposito2204/inventory-manager-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: inventory-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: inventory-config
                  key: NODE_ENV
            - name: BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: inventory-config
                  key: BASE_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/ping
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6