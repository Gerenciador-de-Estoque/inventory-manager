apiVersion: batch/v1
kind: Job
metadata:
  name: backend-seed
  namespace: inventory-manager
spec:
  template:
    spec:
      containers:
        - name: seed
          image: lucaesposito2204/inventory-manager-backend:latest
          command: [ "npm", "run", "db:seed" ]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secret
                  key: DATABASE_URL
      restartPolicy: Never
  backoffLimit: 3
